<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pago y Recibo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    form {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 350px;
      width: 100%;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #4caf50;
      color: white;
      font-size: 1em;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background-color: #45a049;
    }
    #recibo {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: none;
    }
    #recibo h3 {
      margin-top: 0;
      border-bottom: 1px solid #ccc;
      padding-bottom: 10px;
    }
    #recibo p {
      margin: 8px 0;
      font-size: 1em;
    }
  </style>
</head>
<body>

  <form id="pagoForm">
    <h2>Formulario de Pago</h2>
    
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" required placeholder="Juan Pérez" />

    <label for="placa">Placa:</label>
    <input type="text" id="placa" required placeholder="ABC123" />

    <label for="tipo">Tipo de Vehículo:</label>
    <select id="tipo" required>
      <option value="">Seleccione</option>
      <option value="Carro">Carro</option>
      <option value="Moto">Moto</option>
    </select>

    <label for="monto">Monto a Pagar ($):</label>
    <input type="number" id="monto" required min="0" step="0.01" placeholder="50.00" />

    <label for="tarjeta">Número de Tarjeta:</label>
    <input type="text" id="tarjeta" required placeholder="1234 5678 9012 3456" maxlength="19" />

    <button type="submit">Pagar</button>
  </form>

  <div id="recibo">
    <h3>Recibo de Reserva</h3>
    <p><strong>Nombre:</strong> <span id="reciboNombre"></span></p>
    <p><strong>Placa:</strong> <span id="reciboPlaca"></span></p>
    <p><strong>Tipo de vehículo:</strong> <span id="reciboTipo"></span></p>
    <p><strong>Total a pagar:</strong> $<span id="reciboMonto"></span></p>
    <p><strong>Fecha:</strong> <span id="reciboFecha"></span></p>
    <p>Gracias por su pago.</p>
  </div>

<script>
  const form = document.getElementById('pagoForm');
  const recibo = document.getElementById('recibo');
  const reciboNombre = document.getElementById('reciboNombre');
  const reciboMonto = document.getElementById('reciboMonto');
  const reciboFecha = document.getElementById('reciboFecha');
  const reciboPlaca = document.getElementById('reciboPlaca');
  const reciboTipo = document.getElementById('reciboTipo');

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value.trim();
    const placa = document.getElementById('placa').value.trim();
    const tipo = document.getElementById('tipo').value;
    const monto = parseFloat(document.getElementById('monto').value).toFixed(2);

    reciboNombre.textContent = nombre;
    reciboPlaca.textContent = placa;
    reciboTipo.textContent = tipo;
    reciboMonto.textContent = monto;

    const fechaActual = new Date();
    reciboFecha.textContent = fechaActual.toLocaleString();

    recibo.style.display = 'block';
    form.reset();
  });
</script>

</body>
</html>
