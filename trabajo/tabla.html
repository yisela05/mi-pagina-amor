<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vehículos Registrados</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f9f9f9; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    thead {
      background-color: #6540eb;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #eee;
    }
  </style>
</head>
<body>
  <h2>Vehículos Registrados</h2>
  <table id="tablaVehiculos">
    <thead>
      <tr>
        <th>Placa</th>
        <th>Nombre</th>
        <th>Identificación</th>
        <th>Tipo</th>
        <th>Hora Entrada</th>
        <th>Hora Salida</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const vehiculos = JSON.parse(localStorage.getItem('vehiculos')) || [];
    const tbody = document.querySelector('#tablaVehiculos tbody');

    vehiculos.forEach(v => {
      const fila = document.createElement('tr');
      fila.innerHTML = `
        <td>${v.placa}</td>
        <td>${v.nombre}</td>
        <td>${v.identificacion}</td>
        <td>${v.tipo}</td>
        <td>${v.horaEntrada}</td>
        <td>${v.horaSalida}</td>
      `;
      tbody.appendChild(fila);
    });
  </script>
</body>
</html>
